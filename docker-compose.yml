services:
  postgres:
    image: postgres:14
    container_name: servilimar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ulimar
      POSTGRES_PASSWORD: ex4men_db
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - servilimar_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servilimar_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: usuario@servilimar.com
      PGADMIN_DEFAULT_PASSWORD: limar#123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - servilimar_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  servilimar_net:
    driver: bridge
